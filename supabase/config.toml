[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://needlecobbler.com"
additional_redirect_urls = ["https://needlecobbler.com", "https://www.needlecobbler.com"]
jwt_expiry = 3600
enable_signup = true

[functions.loyalty-wallet]
verify_jwt = false

[functions.loyalty-notify]
verify_jwt = false

[functions.cleanup-old-photos]
verify_jwt = false

[functions.pos-login]
verify_jwt = false
